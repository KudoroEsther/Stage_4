<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Insighta Labs+</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="login-body">
    <section class="login-card">
      <p class="eyebrow">Insighta Labs+</p>
      <h1>Secure profile intelligence for analysts and admins.</h1>
      <p>Sign in with GitHub to access the shared backend, CLI, and portal.</p>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      <form action="/auth/login" method="post">
        <button type="submit">Continue with GitHub</button>
      </form>
    </section>
  </body>
</html>
